<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube GPU — Procedural Noise Audit</title>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { background: #050508; color: #eee; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #08080c; border-right: 1px solid #1a1a2e; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { background: #000; border-radius: 8px; width: 512px; height: 512px; image-rendering: pixelated; box-shadow: 0 0 80px rgba(255,220,0,0.06); }
        .hud { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.92); border: 1px solid #ffdd00; padding: 16px 20px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; min-width: 220px; pointer-events: none; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .hud-val { color: #ffdd00; font-weight: 800; }
        h1 { font-size: 1rem; color: #ffdd00; letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid #1a1a2e; padding-bottom: 10px; }
        .badge { display: inline-block; background: #ffdd0020; color: #ffdd00; font-size: 0.6rem; padding: 3px 8px; border-radius: 3px; font-weight: 800; letter-spacing: 0.1em; }
        button { background: #ffdd00; color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; transition: all 0.15s; }
        button:hover { background: #ffee44; transform: translateY(-1px); }
        .desc { font-size: 0.7rem; color: #555; line-height: 1.5; }
        #log { font-size: 0.6rem; color: #444; font-family: monospace; max-height: 140px; overflow-y: auto; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h1>PROCEDURAL NOISE</h1>
            <span class="badge">FRAMEWORK DRIVEN</span>
        </div>
        <p class="desc">Animated GPU pseudo-noise pattern. Simplest possible model — proves that even a single-face, no-pingpong kernel works through the framework.</p>
        <button id="btnStart">GENERATE NOISE</button>
        <div id="log"></div>
    </div>
    <div class="main">
        <canvas id="c" width="256" height="256"></canvas>
        <div class="hud">
            <div class="hud-row"><span>FRAME</span><span class="hud-val" id="hStep">0</span></div>
            <div class="hud-row"><span>FPS</span><span class="hud-val" id="hFps">—</span></div>
        </div>
    </div>
    <script type="module">
        import { GpuCoreFactory } from '/src/GpuCoreFactory.ts';
        import { GpuDemoHelper } from '/tests/renders/GpuDemoHelper.js';
        const canvas = document.getElementById('c');
        const log = document.getElementById('log');
        let engine, wgsl, running = false, fc = 0, lt = 0;
        const L = m => { log.textContent += m+'\n'; log.scrollTop=1e6; console.log(m); };

        document.getElementById('btnStart').onclick = async () => {
            if (running) return;
            L('[1/3] Loading manifest...');
            const f = new GpuCoreFactory();
            const m = await f.loadManifest('../manifests/noise_audit.json');
            L('[2/3] Building engine...');
            engine = await f.build(m.config, m.engine);
            L('[3/3] Loading kernel...');
            wgsl = await (await fetch('/src/kernels/wgsl/NoiseCore.wgsl')).text();
            running = true; lt = performance.now();
            L('✓ Noise streaming');
            requestAnimationFrame(tick);
        };

        async function tick(now) {
            if (!running) return;
            await engine.step({'NoiseCore': wgsl}, 1);

            await GpuDemoHelper.renderToCanvas(engine.dispatcher.device, engine.buffer.gpuBuffer, canvas, {
                mode: 'single', nx: 256, ny: 256,
                faceIdx: 0,
                strideFace: engine.buffer.strideFace, scale: 1.0
            });
            fc++;
            if (now - lt > 500) {
                document.getElementById('hFps').innerText = Math.round(fc/((now-lt)/1000));
                fc=0; lt=now;
            }
            document.getElementById('hStep').innerText = engine.parityManager.currentTick;
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
