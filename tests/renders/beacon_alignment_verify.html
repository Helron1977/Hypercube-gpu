<!DOCTYPE html>
<html>
<head><title>Hypercube - Beacon Alignment Audit</title></head>
<body style="background: #050508; color: #eee; font-family: monospace; padding: 20px;">
    <h1>🚀 BEACON ALIGNMENT AUDIT</h1>
    <pre id="log"></pre>
    <script type="module">
        import { GpuCoreFactory } from '/src/GpuCoreFactory.ts';
        import { HypercubeGPUContext } from '/src/gpu/HypercubeGPUContext.ts';

        const log = (m) => { document.getElementById('log').innerText += m + '\n'; console.log(m); };

        async function runAudit() {
            try {
                log("Starting Beacon Audit (512x128 grid)...");
                if (!await HypercubeGPUContext.init()) throw new Error("WebGPU Fail");

                const NX = 512, NY = 128;

                 const factory = new GpuCoreFactory();
                 const descriptor = {
                     name: 'beacon',
                     version: '1.0.0',
                     faces: [
                         { name: 'f0', type: 'scalar', isSynchronized: true },
                         { name: 'f1', type: 'scalar', isSynchronized: true },
                         { name: 'f2', type: 'scalar', isSynchronized: true },
                         { name: 'f3', type: 'scalar', isSynchronized: true },
                         { name: 'curl', type: 'scalar', isSynchronized: true },
                         { name: 'f_pp', type: 'population', isSynchronized: true, isPingPong: true }
                     ],
                     rules: [{ type: 'beacon', source: 'inline', params: {} }],
                     requirements: { ghostCells: 1, pingPong: true }
                 };

                 const engine = await factory.build({
                     dimensions: { nx: NX, ny: NY, nz: 1 },
                     chunks: { x: 1, y: 1 },
                     boundaries: {},
                     engine: 'beacon',
                     params: {}
                 }, descriptor);

                 // v6.0 Elite Syntax: Pure shader body
                 const BEACON_WGSL = `
                 @compute @workgroup_size(16, 16)
                 fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                     if (id.x >= uniforms.nx || id.y >= uniforms.ny) { return; }
                     let px = id.x; let py = id.y;
                     let i = (py + 1u) * uniforms.strideRow + (px + 1u);
                     
                     // INJECT BEACON EVERY 100 PIXELS
                     if (i % 100u == 0u) {
                         let marker = 1000000.0 + f32(i);
                         // Use generated macro for robustness
                         write_curl_Now(px, py, marker); 
                     }
                 }
                 `;

                 log(`✓ Engine built. strideRow=${engine.buffer.layout.strideRow}, strideFace=${engine.buffer.strideFace}`);

                 engine.use({ beacon: BEACON_WGSL });
                 await engine.step(1);
                 await engine.syncFacesToHost(['curl']);
                 
                 // At Tick 0 (dispatch), Now=0. After step(1), tick=1. 
                 // So we must explicitly ask for parity 0 (which corresponds to Now at Tick 0).
                 const curlData = engine.getFaceData('chunk_0_0_0', 'curl', 0);
                const strideRow = engine.buffer.layout.strideRow;
                
                log("Scanning 'curl' face for beacons...");
                let found = 0, errors = 0;
                
                for (let y = 0; y < NY; y++) {
                    for (let x = 0; x < NX; x++) {
                        const px = x + 1, py = y + 1;
                        const i = py * strideRow + px;
                        if (i % 100 === 0) {
                            const expected = 1000000.0 + i;
                            const actual = curlData[i];
                            if (Math.abs(actual - expected) < 0.1) {
                                found++;
                            } else {
                                if (errors < 5) log(`❌ MISMATCH at y=${y}, x=${x} (i=${i}): Exp=${expected}, Got=${actual}`);
                                errors++;
                            }
                        }
                    }
                }

                if (found > 0 && errors === 0) {
                    log(`⭐ SUCCESS: Found ${found} beacons with 100% accuracy!`);
                } else {
                    log(`❌ FAILURE: Found ${found} beacons, but ${errors} mismatches.`);
                }

            } catch (err) {
                log("❌ ERROR: " + err.message);
            } finally {
                // Pipe result back to the Node CLI Helper (WebMCP Bridge)
                try {
                    await fetch('http://127.0.0.1:3000', {
                        method: 'POST',
                        headers: { 'X-Test-Name': 'beacon-alignment' },
                        body: document.getElementById('log').innerText
                    });
                } catch (e) {}
                
                const mark = document.createElement('div');
                mark.id = "validation-done";
                document.body.appendChild(mark);
            }
        }

        runAudit();
    </script>
</body>
</html>
