<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube GPU — JFA Distance Audit</title>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { background: #050508; color: #eee; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #08080c; border-right: 1px solid #1a1a2e; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { background: #000; border-radius: 8px; width: 512px; height: 512px; image-rendering: pixelated; box-shadow: 0 0 80px rgba(0,255,200,0.06); }
        .hud { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.92); border: 1px solid #00ffc8; padding: 16px 20px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; min-width: 220px; pointer-events: none; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .hud-val { color: #00ffc8; font-weight: 800; }
        h1 { font-size: 1rem; color: #00ffc8; letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid #1a1a2e; padding-bottom: 10px; }
        .badge { display: inline-block; background: #00ffc820; color: #00ffc8; font-size: 0.6rem; padding: 3px 8px; border-radius: 3px; font-weight: 800; letter-spacing: 0.1em; }
        button { background: #00ffc8; color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; transition: all 0.15s; }
        button:hover { background: #33ffdd; transform: translateY(-1px); }
        .desc { font-size: 0.7rem; color: #555; line-height: 1.5; }
        #log { font-size: 0.6rem; color: #444; font-family: monospace; max-height: 140px; overflow-y: auto; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h1>JFA VORONOI</h1>
            <span class="badge">FRAMEWORK DRIVEN</span>
        </div>
        <p class="desc">Jump Flooding Algorithm for Voronoi diagrams. Multi-pass k=64→1. Proves ping-pong face mapping (uv.read/uv.write) and iterative dispatch.</p>
        <button id="btnStart">SEED & FLOOD</button>
        <div id="log"></div>
    </div>
    <div class="main">
        <canvas id="c" width="128" height="128"></canvas>
        <div class="hud">
            <div class="hud-row"><span>PASS</span><span class="hud-val" id="hStep">—</span></div>
            <div class="hud-row"><span>k</span><span class="hud-val" id="hK">—</span></div>
            <div class="hud-row"><span>SEEDS</span><span class="hud-val" id="hSeeds">—</span></div>
        </div>
    </div>
    <script type="module">
        import { GpuCoreFactory } from '/src/GpuCoreFactory.ts';
        import { GpuDemoHelper } from '/tests/renders/GpuDemoHelper.js';
        const canvas = document.getElementById('c');
        const log = document.getElementById('log');
        const L = m => { log.textContent += m+'\n'; log.scrollTop=1e6; console.log(m); };
        let isRunning = false;

        document.getElementById('btnStart').onclick = async () => {
            if (isRunning) return;
            isRunning = true;
            L('[1/4] Loading manifest...');
            const f = new GpuCoreFactory();
            const m = await f.loadManifest('../manifests/jfa_audit.json');
            L('[2/4] Building engine...');
            const engine = await f.build(m.config, m.engine);
            const lx = engine.buffer.layout.strideRow;
            const cells = engine.buffer.layout.cellsPerFaceRaw;
            const strideFace = engine.buffer.strideFace;

            L('[3/4] Seeding 50 random points...');
            const seedData = new Float32Array(cells);
            const numSeeds = 50;
            document.getElementById('hSeeds').innerText = numSeeds;
            for (let s = 0; s < numSeeds; s++) {
                const sx = Math.floor(Math.random() * 128);
                const sy = Math.floor(Math.random() * 128);
                seedData[(sy+1)*lx+(sx+1)] = (sy << 16) | sx;
            }
            engine.setFaceData('chunk_0_0_0', 'uv', seedData, true);
            engine.syncToDevice();

            L('[4/4] Loading kernel...');
            const wgsl = await (await fetch('/src/kernels/wgsl/JfaCore.wgsl')).text();

            // Multi-pass flooding
            let k = 64;
            let pass = 0;
            while (k >= 1) {
                document.getElementById('hK').innerText = k;
                document.getElementById('hStep').innerText = ++pass;
                engine.vGrid.config.params.p0 = k;

                await engine.step({'JfaCore': wgsl}, 1);

                const ri = engine.parityManager.getFaceIndices('uv').read;
                await GpuDemoHelper.renderToCanvas(engine.dispatcher.device, engine.buffer.gpuBuffer, canvas, {
                    mode: 'jfa', nx: 128, ny: 128,
                    faceIdx: ri, strideFace, 
                    ghosts: 1, strideRow: lx
                });
                k = Math.floor(k / 2);
                await new Promise(r => setTimeout(r, 120));
            }
            document.getElementById('hK').innerText = 'DONE';
            L('✓ Voronoi complete');
            isRunning = false;
        };
    </script>
</body>
</html>
