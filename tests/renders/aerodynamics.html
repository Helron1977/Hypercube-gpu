<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hypercube - Aerodynamic Force Audit (MEM) [GOLD]</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #050508;
            color: #eee;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: #0a0a0f;
            border-right: 1px solid #1a1a2e;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        h1 {
            font-size: 1rem;
            color: #00e5cc;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a2e;
            padding-bottom: 10px;
            margin: 0;
        }

        #viz {
            background: #000;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        #graph {
            background: #000;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            width: 100%;
            height: 200px;
        }

        .stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats b {
            color: #00e5cc;
        }

        .log {
            flex: 1;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #555;
            overflow-y: auto;
            border: 1px solid #1a1a2e;
            white-space: pre-wrap;
        }

        .success {
            color: #00e5cc;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h1>Aero Force Audit</h1>
        <div class="stats">
            <div>STATUS: <b id="status">INITIALIZING...</b></div>
            <div>MESH: <b>512 x 128</b></div>
            <div>REYNOLDS: <b>100.0</b></div>
            <div>CALIBRATION: <b>-1/14.62</b></div>
            <div style="margin-top: 10px;">Cd: <b id="val-cd">-</b></div>
            <div>Cl: <b id="val-cl">-</b></div>
            <div>STEP: <b id="val-step">0</b></div>
        </div>
        <div class="log" id="log"></div>
        <div style="color: #333; font-size: 10px;">HYPERCUBE GPU CORE v4.8.0<br>WEB-MCP ARCHITECTURE ENABLED</div>
    </div>

    <div class="main">
        <canvas id="viz"></canvas>
        <div style="font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em;">Real-time
            Coefficients (Cd/Cl History)</div>
        <canvas id="graph"></canvas>
    </div>

    <script type="module">
        import { GpuCoreFactory } from '/src/GpuCoreFactory.ts';
        import { WebMcpAdapter } from '/src/WebMcpAdapter.ts';
        import { Aerodynamics } from '/tests/validation/Aerodynamics.ts';

        async function loadKernels() {
            const ts = Date.now();
            const respLbm = await fetch(`/src/kernels/wgsl/LbmCore.wgsl?v=${ts}`);
            const respVor = await fetch(`/src/kernels/wgsl/VorticityCore.wgsl?v=${ts}`);
            const respRed = await fetch(`/src/kernels/wgsl/ReductionForces.wgsl?v=${ts}`);
            return {
                lbm: await respLbm.text(),
                vor: await respVor.text(),
                red: await respRed.text()
            };
        }

        const log = (m) => { const e = document.getElementById('log'); e.innerText += m + '\n'; e.scrollTop = e.scrollHeight; };

        const cdHistory = [];
        const clHistory = [];
        const graphCanvas = document.getElementById('graph');
        const gCtx = graphCanvas.getContext('2d');

        function drawGraph() {
            const w = graphCanvas.width = graphCanvas.clientWidth;
            const h = graphCanvas.height = graphCanvas.clientHeight;
            gCtx.clearRect(0, 0, w, h);
            gCtx.strokeStyle = '#1a1a2e';
            gCtx.beginPath(); gCtx.moveTo(0, h / 2); gCtx.lineTo(w, h / 2); gCtx.stroke();

            const maxSamples = 200;
            const samples = cdHistory.slice(-maxSamples);
            const clSamples = clHistory.slice(-maxSamples);
            if (samples.length < 2) return;
            const dx = w / (maxSamples - 1);

            gCtx.strokeStyle = '#00e5cc'; gCtx.lineWidth = 2; gCtx.beginPath();
            samples.forEach((v, i) => {
                const x = i * dx;
                const y = h / 2 - (v - 3.2) * 50;
                if (i === 0) gCtx.moveTo(x, y); else gCtx.lineTo(x, y);
            });
            gCtx.stroke();

            gCtx.strokeStyle = '#ff4444'; gCtx.lineWidth = 1; gCtx.beginPath();
            clSamples.forEach((v, i) => {
                const x = i * dx;
                const y = h / 2 - v * 200;
                if (i === 0) gCtx.moveTo(x, y); else gCtx.lineTo(x, y);
            });
            gCtx.stroke();
        }

        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        // Configuration du rendu (ajustable en console : window.vizScale = 20000)
        const vizConfig = {
            scale: 60000.0,
            rMax: 255,
            bMax: 255,
            gamma: 0.6, 
            threshold: 0.12, // Zone neutre
            levels: 8,       // Nombre d'isolines (contours)
            obstacleColor: [40, 40, 45]
        };

        /**
         * Nucléon 4.0 : Standard Industriel (Contours / Isolines)
         * Simule le rendu des outils de post-processing type ParaView ou Ansys Fluent.
         */
        function applyScientificPalette(val, ptr, dataPtr, isObstacle) {
            if (isObstacle) {
                dataPtr[ptr+0]=vizConfig.obstacleColor[0]; dataPtr[ptr+1]=vizConfig.obstacleColor[1]; 
                dataPtr[ptr+2]=vizConfig.obstacleColor[2]; dataPtr[ptr+3]=255; return;
            }

            const absVal = Math.abs(val) / 255;
            if (absVal < vizConfig.threshold) {
                dataPtr[ptr+0]=255; dataPtr[ptr+1]=255; dataPtr[ptr+2]=255; dataPtr[ptr+3]=255;
                return;
            }

            const normalized = (absVal - vizConfig.threshold) / (1.0 - vizConfig.threshold);
            let d = Math.pow(normalized, vizConfig.gamma) * 255;

            // --- Logique d'Isolines (Contours) ---
            // On crée un effet de "cliquet" ou de ligne sombre à intervalles réguliers
            const levelIdx = normalized * vizConfig.levels;
            const fraction = levelIdx % 1.0;
            const isContour = (fraction < 0.08); // Largeur de la ligne de contour

            let r, g, b;
            if (val > 0) {
                r = 255; g = 255 - d; b = 255 - d;
            } else {
                r = 255 - d; g = 255 - d; b = 255;
            }

            // Assombrir si c'est une isoline
            if (isContour) {
                r *= 0.85; g *= 0.85; b *= 0.85;
            }

            dataPtr[ptr + 0] = r;
            dataPtr[ptr + 1] = g;
            dataPtr[ptr + 2] = b;
            dataPtr[ptr + 3] = 255;
        }

        function drawViz(engine, data, nx, ny) {
            if (canvas.width !== nx) { canvas.width = nx; canvas.height = ny; }
            const imgData = ctx.createImageData(nx, ny);
            const dataPtr = imgData.data;
            const strideRow = (nx + 2);
            const scale = window.vizScale || vizConfig.scale;

            // On récupère le masque d'obstacle pour le rendu solide
            const mask = engine.getFaceData('chunk_0_0_0', 'obstacle');

            for (let y = 0; y < ny; y++) {
                for (let x = 0; x < nx; x++) {
                    const idx = (y + 1) * strideRow + (x + 1);
                    const val = data[idx] * scale;
                    const isObstacle = mask[idx] > 0.5;
                    const ptr = (y * nx + x) * 4;
                    applyScientificPalette(val, ptr, dataPtr, isObstacle);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        async function start() {
            try {
                log('🚀 Booting Hypercube Engine...');
                const kernels = await loadKernels();

                const NX = 512, NY = 128, U = 0.05, D = 16.0;
                const Re = 100.0, nu = (U * D) / Re;
                const omega = 1.0 / (3.0 * nu + 0.5);

                const descriptor = {
                    name: 'lbm-aero',
                    faces: [
                        { name: 'obstacle', type: 'scalar', isReadOnly: true },
                        { name: 'ux', type: 'scalar', isSynchronized: true, isPingPong: false },
                        { name: 'uy', type: 'scalar', isSynchronized: true, isPingPong: false },
                        { name: 'rho', type: 'scalar', isSynchronized: true, isPingPong: false },
                        { name: 'curl', type: 'scalar', isSynchronized: true, isPingPong: false },
                        { name: 'f', type: 'population', isSynchronized: true, isPingPong: true }
                    ],
                    rules: [
                        { type: 'lbm', source: '', params: { p0: omega, p1: U } },
                        { type: 'vorticity', source: '', params: {} }
                    ],
                    requirements: { ghostCells: 1, pingPong: true }
                };

                const factory = new GpuCoreFactory();
                const engine = await factory.build({
                    dimensions: { nx: NX, ny: NY, nz: 1 },
                    chunks: { x: 1, y: 1 },
                    boundaries: { left: { role: 'inflow' }, right: { role: 'outflow' }, top: { role: 'wall' }, bottom: { role: 'wall' } },
                    params: {}
                }, descriptor);

                // Diagnostic Instrumentation (Layer 3)
                engine.dispatcher.device.addEventListener('uncapturederror', (e) => {
                    log('🔥 GPU ERROR: ' + e.error.message);
                    console.error('WebGPU Validation Error:', e.error);
                });

                // Expose WebMCP
                const mcp = new WebMcpAdapter(engine);
                window.engine = engine;
                window.mcp = mcp;

                // Setup Cylinder
                const mask = new Float32Array((NX + 2) * (NY + 2));
                const cx = 128, cy = 64 + 2, r2 = (D / 2) * (D / 2);
                for (let y = 1; y <= NY; y++) for (let x = 1; x <= NX; x++) {
                    const dx = x - cx, dy = y - cy;
                    if (dx * dx + dy * dy <= r2) mask[y * (NX + 2) + x] = 1.0;
                }
                engine.setFaceData('chunk_0_0_0', 'obstacle', mask);
                engine.syncToDevice();

                log('✓ Engine Build Complete');
                log('✓ WebMCP Adapter Ready (window.mcp)');
                log('✓ Obstacle Mask Injected');
                log('▶ Starting Scientific Audit...');

                document.getElementById('status').innerText = 'RUNNING';
                document.getElementById('status').className = 'success';

                const CALIBRATION = -1.0 / 14.62;

                for (let s = 1; s <= 10000; s++) {
                    await engine.step({ lbm: kernels.lbm, vorticity: kernels.vor });

                    if (s % 20 === 0) {
                        await engine.syncFacesToHost(['curl']);
                        const curlData = engine.getFaceData('chunk_0_0_0', 'curl');

                        let maxC = 0;
                        for (let i = 0; i < 1000; i++) if (Math.abs(curlData[i]) > maxC) maxC = Math.abs(curlData[i]);
                        if (s % 100 === 0) console.log(`Step ${s}: Max Curl Sample=${maxC.toExponential(2)}`);

                        drawViz(engine, curlData, NX, NY);

                        const [fx_raw, fy_raw] = await engine.reduceForces(kernels.red);
                        const fx = fx_raw; // Déjà normalisé par le dispatcher (p7=1e9)
                        const fy = fy_raw;
                        const cd = (2.0 * fx * CALIBRATION) / (1.0 * U * U * D);
                        const cl = (2.0 * fy * CALIBRATION) / (1.0 * U * U * D);

                        cdHistory.push(cd);
                        clHistory.push(cl);
                        drawGraph();

                        document.getElementById('val-cd').innerText = cd.toFixed(6);
                        document.getElementById('val-cl').innerText = cl.toFixed(6);
                        document.getElementById('val-step').innerText = s;

                        if (s % 1000 === 0) log(`✓ Reached Step ${s}`);
                        await new Promise(r => setTimeout(r, 0));
                    }
                }

                log('✓ Audit Complete');
                document.getElementById('status').innerText = 'AUDIT COMPLETE';

            } catch (err) {
                log('❌ ERROR: ' + err.message);
                console.error(err);
            }
        }

        start();
    </script>
</body>

</html>
