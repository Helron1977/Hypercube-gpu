<!DOCTYPE html>
<html>
<head>
    <title>Hypercube - Conservation Audit</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; padding: 20px; }
        #log { background: #1e293b; padding: 15px; border-radius: 8px; font-family: monospace; height: 80vh; overflow-y: auto; white-space: pre-wrap; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>Phase 1.3: Mass & Momentum Conservation Audit</h1>
    <div id="status">Initializing WebGPU Enironment...</div>
    <div id="log"></div>

    <script type="module">
        // Redirect console to log div
        const log = document.getElementById('log');
        const oldLog = console.log;
        console.log = (...args) => {
            log.innerText += args.join(' ') + '\n';
            log.scrollTop = log.scrollHeight;
            oldLog(...args);
        };
        console.error = (...args) => {
            log.innerHTML += `<span class="error">${args.join(' ')}</span>\n`;
            oldLog(...args);
        };

        import { runConservationAudit } from '../validation/conservation_audit.ts';
        
        async function start() {
            try {
                const results = await runConservationAudit();
                document.getElementById('status').innerText = `AUDIT COMPLETE: ${results.status.toUpperCase()}`;
                if (results.status === 'stable') {
                    document.getElementById('status').classList.add('success');
                } else {
                    document.getElementById('status').classList.add('error');
                }

                // Final Report to Autonomous Runner (port 3000)
                try {
                    await fetch('http://127.0.0.1:3000', {
                        method: 'POST',
                        headers: { 'X-Test-Name': 'conservation-audit' },
                        body: document.getElementById('log').innerText
                    });
                } catch (err) {
                    console.warn("Autonomous Runner not detected on port 3000.");
                }
            } catch (e) {
                console.error("Audit Runtime Error:", e);
                document.getElementById('status').innerText = 'AUDIT FAILED';
                try {
                    await fetch('http://127.0.0.1:3000', {
                        method: 'POST',
                        headers: { 'X-Test-Name': 'conservation-audit' },
                        body: document.getElementById('log').innerText + '\n\nAUDIT FAILED: ' + e.message
                    });
                } catch (err) { }
            }
        }
        
        start();
    </script>
</body>
</html>
