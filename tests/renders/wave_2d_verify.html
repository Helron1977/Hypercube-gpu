<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube GPU — Wave Equation Audit</title>
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { background: #050508; color: #eee; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #08080c; border-right: 1px solid #1a1a2e; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { background: #000; border-radius: 8px; width: 512px; height: 512px; image-rendering: pixelated; box-shadow: 0 0 80px rgba(0,150,255,0.08); cursor: crosshair; }
        .hud { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.92); border: 1px solid #0088ff; padding: 16px 20px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; min-width: 220px; pointer-events: none; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .hud-val { color: #0088ff; font-weight: 800; }
        h1 { font-size: 1rem; color: #0088ff; letter-spacing: 0.15em; text-transform: uppercase; border-bottom: 1px solid #1a1a2e; padding-bottom: 10px; }
        .badge { display: inline-block; background: #0088ff20; color: #0088ff; font-size: 0.6rem; padding: 3px 8px; border-radius: 3px; font-weight: 800; letter-spacing: 0.1em; }
        .ctrl { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; color: #666; text-transform: uppercase; font-weight: 800; letter-spacing: 0.08em; }
        input[type="range"] { width: 100%; accent-color: #0088ff; }
        .val { font-family: monospace; font-size: 0.8rem; color: #0088ff; }
        button { background: #0088ff; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; transition: all 0.15s; }
        button:hover { background: #33aaff; transform: translateY(-1px); }
        .desc { font-size: 0.7rem; color: #555; line-height: 1.5; }
        #log { font-size: 0.6rem; color: #444; font-family: monospace; max-height: 140px; overflow-y: auto; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h1>WAVE EQUATION</h1>
            <span class="badge">FRAMEWORK DRIVEN</span>
        </div>
        <p class="desc">2D wave equation with central pulse. Click canvas to create a new wavefront. Proves multi-face (uNow/uOld/uNext) management.</p>
        <div class="ctrl">
            <label>Wave Speed (c²)</label>
            <input type="range" id="paramC2" min="0.01" max="0.25" step="0.01" value="0.10">
            <span class="val" id="valC2">0.10</span>
        </div>
        <button id="btnStart">LAUNCH WAVE</button>
        <div id="log"></div>
    </div>
    <div class="main">
        <canvas id="c" width="256" height="256"></canvas>
        <div class="hud">
            <div class="hud-row"><span>STEP</span><span class="hud-val" id="hStep">0</span></div>
            <div class="hud-row"><span>FPS</span><span class="hud-val" id="hFps">—</span></div>
            <div class="hud-row"><span>U_max</span><span class="hud-val" id="hUmax">—</span></div>
        </div>
    </div>
    <script type="module">
        import { GpuCoreFactory } from '/src/GpuCoreFactory.ts';
        import { GpuDemoHelper } from '/tests/renders/GpuDemoHelper.js';
        const canvas = document.getElementById('c');
        const log = document.getElementById('log');
        let engine, wgsl, wgslRed, m, running = false, fc = 0, lt = 0, strideFace = 0, lx = 0;
        const L = m => { log.textContent += m+'\n'; log.scrollTop=1e6; console.log(m); };

        // Click to inject a pulse
        canvas.onclick = (e) => {
            if (!engine) return;
            const rect = canvas.getBoundingClientRect();
            const px = Math.floor((e.clientX - rect.left) / rect.width * 256);
            const py = Math.floor((e.clientY - rect.top) / rect.height * 256);
            const cells = engine.buffer.layout.cellsPerFaceRaw;
            const pulse = new Float32Array(cells);
            for (let dy = -3; dy <= 3; dy++) for (let dx = -3; dx <= 3; dx++) {
                const x = px+dx+1, y = py+dy+1;
                if (x > 0 && x < lx-1 && y > 0 && y < lx-1) {
                    const r = Math.sqrt(dx*dx+dy*dy);
                    if (r < 4) pulse[y*lx+x] = Math.cos(r/4*Math.PI*0.5);
                }
            }
            engine.setFaceData('chunk_0_0_0', 'u', pulse, false, 0);
            engine.syncToDevice();
        };

        document.getElementById('btnStart').onclick = async () => {
            if (running) return;
            L('[1/4] Loading manifest...');
            const f = new GpuCoreFactory();
            m = await f.loadManifest('../manifests/wave_audit.json');
            L('[2/4] Building engine...');
            engine = await f.build(m.config, m.engine);
            strideFace = engine.buffer.strideFace;
            lx = m.config.dimensions.nx + 2;
            const cells = engine.buffer.layout.cellsPerFaceRaw;

            L('[3/4] Central pulse...');
            const u0 = new Float32Array(cells);
            const cx = 128, cy = 128;
            for (let dy = -5; dy <= 5; dy++) for (let dx = -5; dx <= 5; dx++) {
                const r = Math.sqrt(dx*dx+dy*dy);
                if (r < 6) u0[(cy+1+dy)*lx+(cx+1+dx)] = Math.cos(r/6*Math.PI*0.5);
            }
            // Initialize slots: t=u0, t-1=u0
            engine.setFaceData('chunk_0_0_0', 'u', u0, false, 0); 
            engine.setFaceData('chunk_0_0_0', 'u', u0, false, 2); 
            engine.syncToDevice();

            L('[4/4] Loading kernels...');
            wgsl = await (await fetch('/src/kernels/wgsl/WaveCore.wgsl')).text();
            wgslRed = await (await fetch('/src/kernels/wgsl/ReductionCore.wgsl')).text();
            engine.use({ 'WaveCore': wgsl });
            running = true; lt = performance.now();
            L('✓ Wave propagating (Native Triple-Buffering)');
            requestAnimationFrame(tick);
        };

        async function tick(now) {
            if (!running) return;
            const c2 = parseFloat(document.getElementById('paramC2').value);
            document.getElementById('valC2').innerText = c2.toFixed(2);
            // p0 = alpha = c²·dt²/dx² (dt=0.5, dx=1.0)
            const dt = 0.5, dx = 1.0;
            engine.params.p0 = c2 * dt * dt / (dx * dx);

            await engine.step(3); // 3 steps = one full rotation

            // After rotation, render the current face (u.now)
            const faceIdx = engine.parityManager.getFaceIndices('u').read;
            
            await GpuDemoHelper.renderToCanvas(engine.dispatcher.device, engine.buffer.gpuBuffer, canvas, {
                mode: 'bipolar', nx: 256, ny: 256,
                faceIdx: faceIdx,
                ghosts: m.engine.requirements.ghostCells || 0,
                strideRow: engine.buffer.layout.strideRow,
                strideFace: strideFace, scale: 300.0
            });
            fc++;
            if (now - lt > 500) {
                const maxVal = await engine.reduceField('u', wgslRed);
                document.getElementById('hUmax').innerText = Math.abs(maxVal).toFixed(4);
                document.getElementById('hFps').innerText = Math.round(fc/((now-lt)/1000));
                fc=0; lt=now;
            }
            document.getElementById('hStep').innerText = engine.parityManager.currentTick;
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
